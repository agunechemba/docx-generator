<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Merger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-lg bg-white rounded-xl shadow-lg border border-slate-200 p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Document Merger</h1>
      <p class="text-sm text-slate-500 mt-1">Generate dynamic Google Docs via your own account</p>
    </div>

    <form id="mergeForm" onsubmit="handleSubmit(event)" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Google Sheet Data URL</label>
        <input type="url" id="sheetUrl" required placeholder="https://docs.google.com/spreadsheets/d/..." 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Google Doc Template URL</label>
        <input type="url" id="templateUrl" required placeholder="https://docs.google.com/document/d/..." 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>

      <button type="submit" id="submitBtn" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg shadow transition duration-150 flex justify-center items-center gap-2 text-sm">
        <span>Sign in & Execute Automation</span>
      </button>
    </form>

    <div id="loadingState" class="hidden mt-6 p-4 bg-blue-50 rounded-lg border border-blue-100 flex items-center gap-3 text-sm text-blue-700">
      <div class="loader"></div>
      <span id="loadingMessage">Initializing secure handshake...</span>
    </div>

    <div id="feedbackBox" class="hidden mt-6 p-4 rounded-lg border text-sm"></div>
  </div>

  <!-- Load Google Client APIs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // ⚠️ REPLACE THIS STRING WITH YOUR ACTUAL CLIENT ID FROM GOOGLE CLOUD CONSOLE
    const CLIENT_ID = '403089530914-8qpqlnfi8f0l2ephvm1ubqsebqagcolh.apps.googleusercontent.com';
    
    const SCOPES = 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive';
    
    let tokenClient;
    let accessToken = null;

    // Helper to pull standard 44-character resource ID from dynamic Google URL strings
    function getIdFromUrl(url) {
      const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
      if (matches && matches.length > 1) return matches[1];
      throw new Error('Invalid Google Link provided. Make sure to paste the full address bar URL.');
    }

    window.onload = function () {
      // Initialize OAuth flow setup
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: '', // defined dynamically inside call
      });
    };

    function updateProgress(message) {
      document.getElementById('loadingMessage').innerText = message;
    }

    async function handleSubmit(event) {
      event.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const loadingState = document.getElementById('loadingState');
      const feedbackBox = document.getElementById('feedbackBox');

      feedbackBox.classList.add('hidden');
      loadingState.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const sheetId = getIdFromUrl(document.getElementById('sheetUrl').value.trim());
        const templateId = getIdFromUrl(document.getElementById('templateUrl').value.trim());

        // Authenticate the user directly through a popups environment
        updateProgress("Requesting permission from your Google Account...");
        accessToken = await getValidToken();

        updateProgress("Connected. Fetching data grid from Google Sheet...");
        const sheetData = await fetchSpreadsheetRows(sheetId);
        
        if (!sheetData || sheetData.length <= 1) {
          throw new Error('Target sheet appears empty or contains only a header line.');
        }

        const headers = sheetData[0];
        updateProgress(`Found ${sheetData.length - 1} data entries. Beginning document generation...`);

        // Resolve location data for saving outputs cleanly near the original template structure
        const targetFolderId = await getTemplateParentFolder(templateId);

        let successCount = 0;
        for (let i = 1; i < sheetData.length; i++) {
          const row = sheetData[i];
          updateProgress(`Processing document profile ${i} of ${sheetData.length - 1}...`);
          
          const fallbackTitle = (row[0] ? row[0].toString() : 'Merged_File') + ' - ' + new Date().toISOString().split('T')[0];
          
          // Copy template, batch replace keys inside target instance scope, cleanly close document instance
          const newDocId = await cloneFile(templateId, fallbackTitle, targetFolderId);
          await executeMergeReplacements(newDocId, headers, row);
          successCount++;
        }

        loadingState.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        feedbackBox.classList.remove('hidden');
        feedbackBox.className = "mt-6 p-4 rounded-lg border bg-green-50 text-green-800 border-green-200 text-sm";
        feedbackBox.innerText = `Success! Generated ${successCount} individual files directly inside your Google Drive template directory folder location.`;

      } catch (error) {
        loadingState.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        feedbackBox.classList.remove('hidden');
        feedbackBox.className = "mt-6 p-4 rounded-lg border bg-red-50 text-red-800 border-red-200 text-sm";
        feedbackBox.innerText = "Execution Interrupted: " + error.message;
      }
    }

    // Promise wrapper converting the native explicit OAuth popup configuration model
    function getValidToken() {
      return new Promise((resolve, reject) => {
        tokenClient.callback = async (response) => {
          if (response.error !== undefined) {
            reject(new Error(`Authorization failed: ${response.error}`));
          }
          resolve(response.access_token);
        };
        tokenClient.requestAccessToken({ prompt: 'consent' });
      });
    }

    async function fetchSpreadsheetRows(sheetId) {
      // Pull metadata structures first to see sheet target tab name
      const metaResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      if (!metaResp.ok) throw new Error("Could not access Google Sheet profile. Double-check layout ownership status.");
      const metaData = await metaResp.json();
      const firstTabName = metaData.sheets[0].properties.title;

      // Extract raw data values range contents
      const dataResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(firstTabName)}!A1:Z1000`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      const dataJson = await dataResp.json();
      return dataJson.values;
    }

    async function getTemplateParentFolder(templateId) {
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${templateId}?fields=parents`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      const fileMeta = await resp.json();
      return (fileMeta.parents && fileMeta.parents.length > 0) ? fileMeta.parents[0] : 'root';
    }

    async function cloneFile(fileId, title, folderId) {
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/copy`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name: title, parents: [folderId] })
      });
      if (!resp.ok) throw new Error("Drive duplication error step failed.");
      const newFile = await resp.json();
      return newFile.id;
    }

    async function executeMergeReplacements(docId, headers, rowData) {
      const requests = [];
      
      for (let j = 0; j < headers.length; j++) {
        const tag = `<<${headers[j]}>>`;
        const val = rowData[j] !== undefined ? rowData[j].toString() : '';
        
        requests.push({
          replaceAllText: {
            containsText: { text: tag, matchCase: true },
            replaceText: val
          }
        });
      }

      const resp = await fetch(`https://docs.googleapis.com/v1/documents/${docId}:batchUpdate`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ requests })
      });
      if (!resp.ok) throw new Error(`Failed text mapping iteration pass inside doc reference: ${docId}`);
      return await resp.json();
    }
  </script>
</body>
</html>
