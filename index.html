<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Document Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.42.0/dist/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 40px 20px;
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            max-width: 600px; width: 100%; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        h1 { color: #1a202c; font-size: 26px; margin-bottom: 5px; }
        .subtitle { color: #718096; margin-bottom: 25px; font-size: 14px; }
        .upload-section {
            border: 2px dashed #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; background: #f7fafc; margin-bottom: 15px; cursor: pointer;
        }
        .upload-section label { display: block; cursor: pointer; font-weight: 600; color: #2d3748; }
        .upload-section input[type="file"] { display: none; }
        .file-status { margin-top: 5px; font-size: 13px; color: #4a5568; }
        .generate-btn {
            width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px;
        }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 12px; border-radius: 8px; text-align: center; font-weight: 500; margin-top: 15px; display: none; font-size: 14px; background: #ebf8ff; color: #2b6cb0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Document Generator</h1>
        <p class="subtitle">Upload template + data → Generate documents</p>

        <div class="upload-section">
            <label for="templateUpload">📝 Step 1: Upload Template (.docx)</label>
            <input type="file" id="templateUpload" accept=".docx">
            <div id="templateStatus" class="file-status">No file selected</div>
        </div>

        <div class="upload-section">
            <label for="dataUpload">📊 Step 2: Upload Data (.csv, .xlsx)</label>
            <input type="file" id="dataUpload" accept=".csv,.xlsx">
            <div id="dataStatus" class="file-status">No file selected</div>
        </div>

        <button class="generate-btn" id="generateBtn" disabled>🚀 Generate Documents</button>
        <div class="status" id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
