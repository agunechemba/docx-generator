<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Document Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a202c;
            margin-bottom: 5px;
            font-size: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .upload-section {
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            background: #f7fafc;
            cursor: pointer;
        }
        .upload-section:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .upload-section.has-file {
            border-color: #48bb78;
            background: #f0fff4;
        }
        .upload-section .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .upload-section label {
            display: block;
            cursor: pointer;
            font-weight: 600;
            color: #2d3748;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .file-status {
            margin-top: 10px;
            font-size: 13px;
            color: #48bb78;
            font-weight: 500;
            word-break: break-all;
        }
        .file-status.error {
            color: #fc8181;
        }

        .download-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 25px 0;
        }
        .option-card {
            padding: 25px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .option-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .option-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .option-card .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .option-card h3 {
            font-size: 16px;
            color: #2d3748;
            margin-bottom: 4px;
        }
        .option-card p {
            font-size: 13px;
            color: #718096;
            line-height: 1.4;
        }
        .option-card .badge {
            display: inline-block;
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #4a5568;
            margin-top: 6px;
        }
        .option-card input[type="radio"] {
            display: none;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.loading {
            background: #ebf8ff;
            color: #2b6cb0;
        }
        .status.success {
            background: #f0fff4;
            color: #22543d;
        }
        .status.error {
            background: #fff5f5;
            color: #9b2c2c;
        }

        .progress-section {
            margin-top: 16px;
            display: none;
        }
        .progress-section.show {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #4a5568;
            margin-top: 6px;
        }

        .stats {
            margin-top: 16px;
            padding: 14px 20px;
            background: #f7fafc;
            border-radius: 10px;
            display: none;
            justify-content: space-around;
            font-size: 14px;
            color: #4a5568;
        }
        .stats.show {
            display: flex;
        }
        .stats span {
            font-weight: 700;
            color: #2d3748;
        }

        .clear-btn {
            background: transparent;
            color: #fc8181;
            border: 1px dashed #fc8181;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 15px;
            display: block;
            margin-left: auto;
            transition: background 0.2s;
        }
        .clear-btn:hover {
            background: #fff5f5;
        }

        @media (max-width: 700px) {
            .container {
                padding: 25px;
            }
            .upload-grid {
                grid-template-columns: 1fr;
            }
            .download-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📄</span> Document Generator
        </h1>
        <p class="subtitle">Upload template + data → Generate documents → Download</p>

        <div class="upload-grid">
            <div class="upload-section" id="templateDrop">
                <span class="icon">📝</span>
                <label for="templateUpload">
                    <strong>Upload Template</strong>
                    <div style="font-weight:normal;color:#718096;font-size:13px;margin-top:4px;">
                        .docx file with placeholders
                    </div>
                </label>
                <input type="file" id="templateUpload" accept=".docx">
                <div id="templateStatus" class="file-status">No file selected</div>
            </div>

            <div class="upload-section" id="dataDrop">
                <span class="icon">📊</span>
                <label for="dataUpload">
                    <strong>Upload Data</strong>
                    <div style="font-weight:normal;color:#718096;font-size:13px;margin-top:4px;">
                        .csv or .xlsx with column headers
                    </div>
                </label>
                <input type="file" id="dataUpload" accept=".csv,.xlsx">
                <div id="dataStatus" class="file-status">No file selected</div>
            </div>
        </div>

        <p style="font-weight:600;color:#2d3748;margin-bottom:10px;font-size:15px;">
            Choose how to download:
        </p>
        <div class="download-options">
            <label class="option-card selected" id="optionMerged">
                <input type="radio" name="downloadMode" value="merged" checked>
                <div class="icon">📚</div>
                <h3>Single Merged Document</h3>
                <p>All documents combined into ONE file</p>
                <span class="badge">One .docx file</span>
            </label>
            <label class="option-card" id="optionZIP">
                <input type="radio" name="downloadMode" value="zip">
                <div class="icon">📦</div>
                <h3>ZIP Archive</h3>
                <p>Each document as a separate file</p>
                <span class="badge">One .zip file</span>
            </label>
        </div>

        <button class="generate-btn" id="generateBtn" disabled>
            🚀 Generate Documents
        </button>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="progressLabel">Processing...</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div class="stats" id="stats">
            <div>📋 Records: <span id="recordCount">0</span></div>
            <div>📄 Documents: <span id="docCount">0</span></div>
            <div>📁 Output: <span id="outputType">Merged</span></div>
        </div>

        <button class="clear-btn" id="clearStorageBtn" style="display:none;">🗑️ Clear Cached Files</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.42.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        let templateBuffer = null;
        let templateName = 'document';
        let csvData = [];
        let downloadMode = 'merged';

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const templateInput = document.getElementById('templateUpload');
        const dataInput = document.getElementById('dataUpload');
        const templateStatus = document.getElementById('templateStatus');
        const dataStatus = document.getElementById('dataStatus');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');
        const statsDiv = document.getElementById('stats');
        const recordCount = document.getElementById('recordCount');
        const docCount = document.getElementById('docCount');
        const outputType = document.getElementById('outputType');
        const clearStorageBtn = document.getElementById('clearStorageBtn');

        const templateDrop = document.getElementById('templateDrop');
        const dataDrop = document.getElementById('dataDrop');

        // Setup download selection options card triggers
        const optionCards = document.querySelectorAll('.option-card');
        optionCards.forEach(card => {
            card.addEventListener('click', function() {
                optionCards.forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                const radio = this.querySelector('input[type="radio"]');
                radio.checked = true;
                downloadMode = radio.value;
                outputType.textContent = downloadMode === 'merged' ? 'Merged' : 'ZIP';
                localStorage.setItem('docGen_downloadMode', downloadMode);
                updateUI();
            });
        });

        // ============================================
        // UTILITY FUNCTIONS FOR BINARY STORAGE
        // ============================================
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // ============================================
        // LOCAL STORAGE ENGINE
        // ============================================
        function loadSavedState() {
            try {
                const savedMode = localStorage.getItem('docGen_downloadMode');
                if (savedMode) {
                    downloadMode = savedMode;
                    optionCards.forEach(card => {
                        const radio = card.querySelector('input[type="radio"]');
                        if (radio.value === downloadMode) {
                            optionCards.forEach(c => c.classList.remove('selected'));
                            card.classList.add('selected');
                            radio.checked = true;
                        }
                    });
                    outputType.textContent = downloadMode === 'merged' ? 'Merged' : 'ZIP';
                }

                const savedTemplateName = localStorage.getItem('docGen_templateName');
                const savedTemplateBase64 = localStorage.getItem('docGen_templateBuffer');
                if (savedTemplateName && savedTemplateBase64) {
                    templateName = savedTemplateName;
                    templateBuffer = base64ToArrayBuffer(savedTemplateBase64);
                    templateStatus.textContent = `💾 Recovered: ${templateName}.docx`;
                    templateDrop.classList.add('has-file');
                    clearStorageBtn.style.display = 'block';
                }

                const savedCsvData = localStorage.getItem('docGen_csvData');
                const savedDataFilename = localStorage.getItem('docGen_dataFilename') || 'cached_data';
                if (savedCsvData) {
                    csvData = JSON.parse(savedCsvData);
                    dataStatus.textContent = `💾 Recovered: ${csvData.length} rows from ${savedDataFilename}`;
                    dataDrop.classList.add('has-file');
                    recordCount.textContent = csvData.length;
                    docCount.textContent = csvData.length;
                    statsDiv.classList.add('show');
                    clearStorageBtn.style.display = 'block';
                }
                updateUI();
            } catch (e) {
                console.error("Failed to restore saved local session state:", e);
            }
        }

        clearStorageBtn.addEventListener('click', function() {
            localStorage.clear();
            location.reload();
        });

        // ============================================
        // FILE HANDLERS
        // ============================================
        templateInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.name.endsWith('.docx')) {
                templateStatus.textContent = '❌ Please upload a .docx file';
                templateStatus.className = 'file-status error';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                templateBuffer = event.target.result;
                templateName = file.name.replace('.docx', '');
                templateStatus.textContent = `✅ ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                templateStatus.className = 'file-status';
                templateDrop.classList.add('has-file');
                
                // Persist template
                try {
                    const base64Str = arrayBufferToBase64(templateBuffer);
                    localStorage.setItem('docGen_templateBuffer', base64Str);
                    localStorage.setItem('docGen_templateName', templateName);
                    clearStorageBtn.style.display = 'block';
                } catch(err) {
                    console.warn("Template file is too large to fully cache in LocalStorage quota limits.");
                }
                updateUI();
            };
            reader.readAsArrayBuffer(file);
        });

        dataInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    let workbook;
                    if (file.name.endsWith('.csv')) {
                        const text = new TextDecoder().decode(event.target.result);
                        const lines = text.split('\n').filter(line => line.trim());
                        if (lines.length < 2) throw new Error('CSV must have headers and rows');
                        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                        csvData = lines.slice(1).map(line => {
                            const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                            const obj = {};
                            headers.forEach((h, i) => { obj[h] = values[i] || ''; });
                            return obj;
                        });
                    } else {
                        const data = new Uint8Array(event.target.result);
                        workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        csvData = XLSX.utils.sheet_to_json(firstSheet);
                    }

                    if (csvData.length === 0) throw new Error('No data rows found');

                    dataStatus.textContent = `✅ ${csvData.length} records loaded from ${file.name}`;
                    dataStatus.className = 'file-status';
                    dataDrop.classList.add('has-file');
                    recordCount.textContent = csvData.length;
                    docCount.textContent = csvData.length;
                    statsDiv.classList.add('show');

                    // Persist dataset
                    try {
                        localStorage.setItem('docGen_csvData', JSON.stringify(csvData));
                        localStorage.setItem('docGen_dataFilename', file.name);
                        clearStorageBtn.style.display = 'block';
                    } catch(err) {
                        console.warn("Dataset exceeds maximum browser LocalStorage quota capacity.");
                    }
                    updateUI();
                } catch (error) {
                    dataStatus.textContent = `❌ Error: ${error.message}`;
                    dataStatus.className = 'file-status error';
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Drag and Drop functional attachments
        [templateDrop, dataDrop].forEach(section => {
            section.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#667eea';
                this.style.background = '#f0f4ff';
            });
            section.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = this.classList.contains('has-file') ? '#48bb78' : '#e2e8f0';
                this.style.background = this.classList.contains('has-file') ? '#f0fff4' : '#f7fafc';
            });
            section.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '#e2e8f0';
                this.style.background = '#f7fafc';
                const input = this.querySelector('input[type="file"]');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    input.dispatchEvent(new Event('change'));
                }
            });
        });

        function updateUI() {
            const ready = templateBuffer !== null && csvData.length > 0;
            generateBtn.disabled = !ready;
            if (ready) {
                generateBtn.textContent = `🚀 Generate ${downloadMode === 'merged' ? 'Merged Document' : 'ZIP Archive'}`;
            } else {
                generateBtn.textContent = '🚀 Generate Documents';
            }
        }

        // ============================================
        // CORE BATCH GENERATION WORKFLOW
        // ============================================
        function generateDocuments() {
            if (typeof PizZip === 'undefined' || typeof Docxtemplater === 'undefined') {
                showStatus('❌ Error: Framework parsing runtimes failed loading dependencies.', 'error');
                return;
            }

            generateBtn.disabled = true;
            showStatus('Processing generation tasks...', 'loading');
            progressSection.classList.add('show');
            progressFill.style.width = '0%';
            progressLabel.textContent = 'Initializing engine...';
            progressPercent.textContent = '0%';

            setTimeout(() => {
                try {
                    const total = csvData.length;
                    if (downloadMode === 'merged') {
                        generateMergedFallback(total);
                    } else {
                        generateZIP(total);
                    }
                    showStatus(`✅ Generated batch files successfully!`, 'success');
                    progressLabel.textContent = 'Complete! ✅';
                    progressPercent.textContent = '100%';
                    progressFill.style.width = '100%';
                } catch (error) {
                    console.error(error);
                    showStatus(`❌ Runtime Processing Error: ${error.message}`, 'error');
                } finally {
                    generateBtn.disabled = false;
                    updateUI();
                }
            }, 100);
        }

        function generateMergedFallback(total) {
            let combinedContent = '';
            let bodyAttributes = '';

            for (let i = 0; i < total; i++) {
                const zip = new PizZip(templateBuffer);
                const doc = new Docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                doc.render(csvData[i]);
                const docXml = doc.getZip().file('word/document.xml').asText();

                if (i === 0) {
                    const bodyMatch = docXml.match(/<w:body([^>]*)>([\s\S]*?)<\/w:body>/);
                    bodyAttributes = bodyMatch ? bodyMatch[1] : '';
                    combinedContent = bodyMatch ? bodyMatch[2] : docXml;
                } else {
                    const bodyMatch = docXml.match(/<w:body[^>]*>([\s\S]*?)<\/w:body>/);
                    if (bodyMatch && bodyMatch[1]) {
                        combinedContent += '<w:p><w:r><w:br w:type="page"/></w:r></w:p>' + bodyMatch[1];
                    }
                }
                const progress = ((i + 1) / total) * 100;
                progressFill.style.width = `${progress}%`;
                progressPercent.textContent = `${Math.round(progress)}%`;
                progressLabel.textContent = `Compiling ${i + 1}/${total}`;
            }

            const fullXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body${bodyAttributes}>${combinedContent}</w:body></w:document>`;
            const finalZip = new PizZip(templateBuffer);
            finalZip.file('word/document.xml', fullXml);
            const outBlob = finalZip.generate({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            saveAs(outBlob, `${templateName}_merged.docx`);
        }

        function generateZIP(total) {
            const exportZip = new PizZip();

            for (let i = 0; i < total; i++) {
                const row = csvData[i];
                const zip = new PizZip(templateBuffer);
                const doc = new Docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                doc.render(row);

                const outBlob = doc.getZip().generate({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
                const rawName = row.name || row.Name || row.NAME || `document_${i + 1}`;
                const safeName = String(rawName).replace(/[^a-zA-Z0-9]/g, '_').substring(0, 50);
                exportZip.file(`${safeName}.docx`, outBlob);

                const progress = ((i + 1) / total) * 100;
                progressFill.style.width = `${progress}%`;
                progressPercent.textContent = `${Math.round(progress)}%`;
                progressLabel.textContent = `Archiving ${i + 1}/${total}`;
            }
            const zipContent = exportZip.generate({ type: 'blob' });
            saveAs(zipContent, `${templateName}_archive.zip`);
        }

        function showStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = `status show ${type}`;
        }

        // Trigger loading the stored session files on start
        document.addEventListener('DOMContentLoaded', loadSavedState);
        generateBtn.addEventListener('click', generateDocuments);
    </script>
</body>
</html>
